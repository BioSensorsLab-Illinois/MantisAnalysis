project:
  name: MantisAnalysis
  version: "0.2.0"
  description: "Analysis suite for MantisCam GSense BSI dual-gain RGB-NIR recordings — USAF resolution, FPN, depth-of-field. FastAPI + React 18 browser app."
  license: MIT
  author:
    name: Zhongmin Zhu
    email: j@polarxphotonics.com
  organization: BioSensors Lab @ UIUC
  homepage: https://github.com/BioSensorsLab-Illinois/MantisAnalysis

languages:
  primary: python
  python_floor: "3.10"
  ui_stack: "FastAPI + React 18 (Babel standalone via CDN; no bundler today — see B-0014)"

major_modules:
  - path: mantisanalysis/__init__.py
    role: "package marker + __version__"
  - path: mantisanalysis/__main__.py
    role: "`python -m mantisanalysis` entry"
  - path: mantisanalysis/app.py
    role: "CLI → uvicorn boot + browser auto-open"
  - path: mantisanalysis/server.py
    role: "FastAPI routes + Pydantic schemas"
  - path: mantisanalysis/session.py
    role: "in-memory source store (LRU), thumbnail helpers"
  - path: mantisanalysis/figures.py
    role: "matplotlib → PNG bytes adapter"
  - path: mantisanalysis/plotting.py
    role: "shared matplotlib helpers (CHANNEL_COLORS, _color, _ch, _style_axes)"
  - path: mantisanalysis/extract.py
    role: "GSense dual-gain 4×4 super-pixel Bayer extractor (constants locked)"
  - path: mantisanalysis/image_io.py
    role: "unified loader — H5 + PNG/TIFF/JPG; ISP-mode aware"
  - path: mantisanalysis/image_processing.py
    role: "sharpen + tone-curve helpers"
  - path: mantisanalysis/isp_modes.py
    role: "ISP-mode registry — bare single/dual, RGB-NIR, RGB/grayscale image, polarization single/dual"
  - path: mantisanalysis/usaf_groups.py
    role: "USAF lp/mm + Michelson estimators (percentile / minmax / FFT)"
  - path: mantisanalysis/usaf_render.py
    role: "USAF matplotlib figure builders"
  - path: mantisanalysis/usaf_figures.py
    role: "alt USAF figure set (hi-dpi journal style)"
  - path: mantisanalysis/fpn_analysis.py
    role: "FPN math (ISP filters + outlier mask + statistics)"
  - path: mantisanalysis/fpn_render.py
    role: "FPN matplotlib figure builders"
  - path: mantisanalysis/dof_analysis.py
    role: "DoF focus metrics (laplacian, brenner, tenengrad, fft_hf)"
  - path: mantisanalysis/dof_render.py
    role: "DoF matplotlib figure builders"
  - path: mantisanalysis/resolution.py
    role: "LEGACY auto-strip FFT MTF (kept per D-0004)"
  - path: web/index.html
    role: "React 18 SPA entry; Babel standalone + CDN React"
  - path: web/src/shared.jsx
    role: "BRAND, THEMES, icons, hooks, chart primitives (Chart, Page, useChartGeom, tokens, renderChartToPng)"
  - path: web/src/app.jsx
    role: "App shell, TopBar, ModeRail, ⌘K palette, source bootstrap"
  - path: web/src/usaf.jsx
    role: "USAF mode panel — line pick, live Michelson"
  - path: web/src/fpn.jsx
    role: "FPN mode panel — ROI drag, live DSNU/PRNU"
  - path: web/src/dof.jsx
    role: "DoF mode panel — points + lines + H/V refs + tilt"
  - path: web/src/analysis.jsx
    role: "analysis modal — per-mode tabs + CSV/PNG export"
  - path: web/src/isp_settings.jsx
    role: "ISP settings modal — mode selector + per-channel geometry"

entry_points:
  - "python -m mantisanalysis"
  - "mantisanalysis"                          # via pyproject [project.scripts]
  - "uvicorn mantisanalysis.server:app"       # bare ASGI runner
  - "MantisAnalysis.bat"                      # Windows double-click
  - "MantisAnalysis.command"                  # macOS double-click
  - "python scripts/run_usaf_resolution.py"   # legacy CLI (Workflow A)
  - "python scripts/inspect_recording.py"     # H5 inspector

commands:
  install_user: "python -m pip install -e ."
  install_dev:  "python -m pip install -e .[dev]"
  install_websmoke: "python -m pip install -e .[web-smoke] && playwright install chromium"
  run:          "python -m mantisanalysis"
  run_no_browser: "python -m mantisanalysis --no-browser"
  smoke_t0:     "python scripts/smoke_test.py --tier 0"
  smoke_t1:     "python scripts/smoke_test.py --tier 1"
  smoke_t2:     "python scripts/smoke_test.py --tier 2"
  smoke_t3:     "python scripts/smoke_test.py --tier 3"
  test:         "python -m pytest -q"
  test_web_smoke: "pytest -m web_smoke -q"
  lint:         "python -m ruff check mantisanalysis scripts tests"
  format:       "python -m ruff format mantisanalysis scripts tests"
  typecheck:    "python -m mypy mantisanalysis"
  check_docs:   "python scripts/check_agent_docs.py"

quality_gates:
  mandatory_always:
    - "scripts/smoke_test.py --tier 0"   # docs consistency
    - "pytest -q"
  mandatory_non_doc:
    - "scripts/smoke_test.py --tier 1"
    - "scripts/smoke_test.py --tier 2"
  mandatory_backend_or_data:
    - "scripts/smoke_test.py --tier 3"
  mandatory_ui:
    - "scripts/smoke_test.py --tier 3"
    - "pytest -m web_smoke -q"
  not_yet_in_ci:
    - "tier 0"
    - "tier 4 (playwright)"
    - "ruff lint"
    - "mypy"

risky_areas:
  - "GSense Bayer constants in mantisanalysis/extract.py:25-26 (locked)"
  - "Channel key schema HG-R..LG-Y / R..Y / L (frozen contract)"
  - "session.STORE LRU(12) — frontend holding stale source_id after eviction"
  - "ISP reconfig mid-analysis — dark frame detach + raw_frame re-extract"
  - "dom-to-image export pipeline — CORS on Google Fonts, canvas+SVG composite"
  - "localStorage keys under mantis/ — schema migrations need care"
  - "matplotlib font rendering differs between CI and local (visual regression)"
  - "Rotate / flip silently invalidates picks (no coordinate remap)"

important_docs:
  root_entry:     CLAUDE.md
  agents_pointer: AGENTS.md
  start_here:     .agent/00_START_HERE.md
  rules:          .agent/AGENT_RULES.md
  setup:          .agent/SETUP_AND_RUN.md
  workflows:      .agent/WORKFLOWS.md
  architecture:   .agent/ARCHITECTURE.md
  repo_map:       .agent/REPO_MAP.md
  quality_gates:  .agent/QUALITY_GATES.md
  ui_verify:      .agent/UI_VERIFICATION.md
  stopping:       .agent/STOPPING_CRITERIA.md
  references:     .agent/REFERENCES.md
  decisions:      .agent/DECISIONS.md
  risks:          .agent/RISKS.md
  backlog:        .agent/BACKLOG.md
  handoff:        .agent/HANDOFF.md
  changelog:      .agent/CHANGELOG_AGENT.md
  playbook:       .agent/TASK_PLAYBOOK.md
  tools:          .agent/TOOLS_AND_SKILLS.md
  session_boot:   .agent/SESSION_BOOTSTRAP.md
  skills_index:   .agent/skills/README.md
  agents_index:   .agent/agents/README.md
  user_readme:    README.md

handoff: .agent/HANDOFF.md
