project:
  name: MantisAnalysis
  version: "0.2.0"
  description: "Analysis suite for MantisCam GSense BSI dual-gain RGB-NIR recordings — USAF resolution, FPN, depth-of-field, and Playback (Recording Inspection — flag-gated). FastAPI + React 18 browser app."
  license: MIT
  author:
    name: Zhongmin Zhu
    email: j@polarxphotonics.com
  organization: BioSensors Lab @ UIUC
  homepage: https://github.com/BioSensorsLab-Illinois/MantisAnalysis

languages:
  primary: python
  python_floor: "3.10"
  ui_stack: "FastAPI + React 18 (Vite-bundled SPA; built to web/dist/ via npm run build — bundler-migration-v1 Phase 3)"

major_modules:
  - path: mantisanalysis/__init__.py
    role: "package marker + __version__"
  - path: mantisanalysis/__main__.py
    role: "`python -m mantisanalysis` entry"
  - path: mantisanalysis/app.py
    role: "CLI → uvicorn boot + browser auto-open"
  - path: mantisanalysis/server.py
    role: "FastAPI routes + Pydantic schemas"
  - path: mantisanalysis/session.py
    role: "in-memory source store (LRU), thumbnail helpers"
  - path: mantisanalysis/figures.py
    role: "matplotlib → PNG bytes adapter"
  - path: mantisanalysis/plotting.py
    role: "shared matplotlib helpers (CHANNEL_COLORS, _color, _ch, _style_axes)"
  - path: mantisanalysis/extract.py
    role: "GSense dual-gain 4×4 super-pixel Bayer extractor (constants locked)"
  - path: mantisanalysis/image_io.py
    role: "unified loader — H5 + PNG/TIFF/JPG; ISP-mode aware"
  - path: mantisanalysis/image_processing.py
    role: "sharpen + tone-curve helpers"
  - path: mantisanalysis/isp_modes.py
    role: "ISP-mode registry — bare single/dual, RGB-NIR, RGB/grayscale image, polarization single/dual"
  - path: mantisanalysis/usaf_groups.py
    role: "USAF lp/mm + Michelson estimators (percentile / minmax / FFT)"
  - path: mantisanalysis/usaf_render.py
    role: "USAF matplotlib figure builders"
  - path: mantisanalysis/usaf_figures.py
    role: "alt USAF figure set (hi-dpi journal style)"
  - path: mantisanalysis/fpn_analysis.py
    role: "FPN math (ISP filters + outlier mask + statistics)"
  - path: mantisanalysis/fpn_render.py
    role: "FPN matplotlib figure builders"
  - path: mantisanalysis/dof_analysis.py
    role: "DoF focus metrics (laplacian, brenner, tenengrad, fft_hf)"
  - path: mantisanalysis/dof_render.py
    role: "DoF matplotlib figure builders"
  - path: mantisanalysis/resolution.py
    role: "LEGACY auto-strip FFT MTF (kept per D-0004)"
  - path: mantisanalysis/recording.py
    role: "Playback: H5 metadata inspection + extract_frame (5 ISP modes; AGENT_RULES rule 7 pure)"
  - path: mantisanalysis/dark_frame.py
    role: "Playback: average_dark_h5 (mean / median / sigma_clipped) + match_dark_by_exposure (zero-target guard per risk-skeptic A5)"
  - path: mantisanalysis/playback_session.py
    role: "Playback: PlaybackStore + RecordingHandle/DarkHandle/StreamHandle/ExportJob + process-global byte-capped frame LRU"
  - path: mantisanalysis/playback_pipeline.py
    role: "Playback: WYSIWYG single render entry (render_frame) + solve_ccm_from_patches + CCM_TARGETS"
  - path: mantisanalysis/playback_export.py
    role: "Playback: image (PNG/TIFF/JPEG) + video (mp4/apng/gif/png-seq) export + ffmpeg gate; render_views_for_frame applies dark per-view (M12 fastapi-backend P0 #1)"
  - path: mantisanalysis/playback_api.py
    role: "Playback: 24+ /api/playback/* routes (incl. handoff via STORE.register_external; HandoffRequest Pydantic; W-HANDOFF-NOLUM error-code shape)"
  - path: web/index.html
    role: "React 18 SPA entry — Vite root; loads /src/main.tsx as ES module"
  - path: web/src/main.tsx
    role: "Vite entry — mounts <App /> via createRoot (TypeScript seed file, bundler-migration-v1 Phase 5)"
  - path: web/src/shared.tsx
    role: "BRAND, THEMES, icons, hooks, chart primitives (Chart, Page, useChartGeom, tokens, renderChartToPng). TypeScript (@ts-nocheck pending per-file typing) — Phase 5b"
  - path: web/src/app.tsx
    role: "App shell, TopBar, ModeRail, ⌘K palette, source bootstrap. TypeScript (@ts-nocheck)"
  - path: web/src/usaf.tsx
    role: "USAF mode panel — line pick, live Michelson. TypeScript (@ts-nocheck)"
  - path: web/src/fpn.tsx
    role: "FPN mode panel — ROI drag, live DSNU/PRNU. TypeScript (@ts-nocheck)"
  - path: web/src/dof.tsx
    role: "DoF mode panel — points + lines + H/V refs + tilt. TypeScript (@ts-nocheck)"
  - path: web/src/analysis.tsx
    role: "analysis modal — per-mode tabs + CSV/PNG export. TypeScript (@ts-nocheck)"
  - path: web/src/isp_settings.tsx
    role: "ISP settings modal — mode selector + per-channel geometry (TypeScript; typed — Phase 5b-1)"
  - path: web/src/Brand.stories.tsx
    role: "Storybook seed story (BRAND swatches) — Phase 7 of bundler-migration-v1"
  - path: web/src/ProcessingBadge.stories.tsx
    role: "Playback: Storybook story for the ProcessingBadge primitive (8 variants) — recording-inspection-implementation-v1 M11"
  - path: web/src/playback/
    role: "Playback (Recording Inspection) mode — 16 React components: api, state, EmptyState, SourcesPanel, StreamHeader, StreamBuilderModal, FilePill, DarkFrameRow, ViewerCard (race-aware epoch + 6-button hover toolbar incl. handoff), ViewerGrid (5 layout presets), TimelineStrip (file-boundary shading + locked pins), Inspector (9 collapsible sections + CCM editor + presets + frame-LRU widget), OverlayBuilderModal, ExportImageModal, ExportVideoModal (W12/W13), index (mode entry, ticker, keyboard map, modal mounts). Flag-gated by mantis/playback/enabled localStorage key (default OFF — B-0032 will flip)."
  - path: .storybook/main.ts
    role: "Storybook flat config — bundler-migration-v1 Phase 7"
  - path: .storybook/preview.ts
    role: "Storybook preview decorators — dark backdrop + WCAG a11y addon"
  - path: tests/web/test_accessibility.py
    role: "axe-core WCAG A/AA gate — bundler-migration-v1 Phase 6"
  - path: tests/unit/_h5_fixtures.py
    role: "Playback: synthetic H5 builder (8 layout variants) — recording-inspection-implementation-v1 M1"
  - path: tests/unit/test_recording_inspect.py
    role: "Playback M1: H5 inspection + 7-fallback layout detection (22 tests)"
  - path: tests/unit/test_dark_frame.py
    role: "Playback M2: dark-frame averaging strategies + exposure matching (19 tests)"
  - path: tests/unit/test_playback_stream.py
    role: "Playback M3: PlaybackStore multi-file streams + frame LRU (26 tests)"
  - path: tests/unit/test_playback_pipeline.py
    role: "Playback M4 + M8: render_frame WYSIWYG + CCM solve (23 tests)"
  - path: tests/headless/test_playback_api.py
    role: "Playback Tier 3: /api/playback/* round-trip (45 tests including byte-equal WYSIWYG with dark, CCM, handoff with double-dark refusal, frame-LRU)"
  - path: tests/web/test_playback_boot.py
    role: "Playback Tier 4: rail tile, empty state, Sources panel, Stream Builder, ViewerGrid, Inspector, Overlay, Export, Handoff (16 web_smoke tests)"
  - path: tests/web/test_playback_visual_baselines.py
    role: "Playback M12: 5 visual-regression baselines (light + dark empty state + sample loaded single + 2x2 + 1024 narrow) — diff is B-0038 follow-up"

entry_points:
  - "python -m mantisanalysis"
  - "mantisanalysis"                          # via pyproject [project.scripts]
  - "uvicorn mantisanalysis.server:app"       # bare ASGI runner
  - "MantisAnalysis.bat"                      # Windows double-click
  - "MantisAnalysis.command"                  # macOS double-click
  - "python scripts/run_usaf_resolution.py"   # legacy CLI (Workflow A)
  - "python scripts/inspect_recording.py"     # H5 inspector

commands:
  install_user: "python -m pip install -e ."
  install_dev:  "python -m pip install -e .[dev]"
  install_websmoke: "python -m pip install -e .[web-smoke] && playwright install chromium"
  run:          "python -m mantisanalysis"
  run_no_browser: "python -m mantisanalysis --no-browser"
  smoke_t0:     "python scripts/smoke_test.py --tier 0"
  smoke_t1:     "python scripts/smoke_test.py --tier 1"
  smoke_t2:     "python scripts/smoke_test.py --tier 2"
  smoke_t3:     "python scripts/smoke_test.py --tier 3"
  test:         "python -m pytest -q"
  test_web_smoke: "pytest -m web_smoke -q"
  lint:         "python -m ruff check mantisanalysis scripts tests"
  format:       "python -m ruff format mantisanalysis scripts tests"
  typecheck:    "python -m mypy mantisanalysis"
  check_docs:   "python scripts/check_agent_docs.py"

quality_gates:
  mandatory_always:
    - "scripts/smoke_test.py --tier 0"   # docs consistency
    - "pytest -q"
  mandatory_non_doc:
    - "scripts/smoke_test.py --tier 1"
    - "scripts/smoke_test.py --tier 2"
  mandatory_backend_or_data:
    - "scripts/smoke_test.py --tier 3"
  mandatory_ui:
    - "scripts/smoke_test.py --tier 3"
    - "pytest -m web_smoke -q"
  not_yet_in_ci:
    - "tier 0"
    - "tier 4 (playwright)"
    - "ruff lint"
    - "mypy"

risky_areas:
  - "GSense Bayer constants in mantisanalysis/extract.py:25-26 (locked)"
  - "Channel key schema HG-R..LG-Y / R..Y / L (frozen contract)"
  - "session.STORE LRU(12) — frontend holding stale source_id after eviction"
  - "ISP reconfig mid-analysis — dark frame detach + raw_frame re-extract"
  - "dom-to-image export pipeline — CORS on Google Fonts, canvas+SVG composite"
  - "localStorage keys under mantis/ — schema migrations need care"
  - "matplotlib font rendering differs between CI and local (visual regression)"
  - "Rotate / flip silently invalidates picks (no coordinate remap)"
  - "Playback video encode is single-process (R-0017); cancel granularity = 1 frame; ProcessPool migration deferred to B-0029"
  - "Playback feature flag is OFF by default (R-0018) — set mantis/playback/enabled=1 in DevTools then reload"
  - "Playback visual baselines (R-0019) committed for review evidence; diff against prior is B-0038"
  - "Playback handoff carries dark_already_subtracted contract (D-0020); STORE.attach_dark_* refuses double-subtract"

important_docs:
  root_entry:     CLAUDE.md
  agents_pointer: AGENTS.md
  start_here:     .agent/00_START_HERE.md
  rules:          .agent/AGENT_RULES.md
  setup:          .agent/SETUP_AND_RUN.md
  workflows:      .agent/WORKFLOWS.md
  architecture:   .agent/ARCHITECTURE.md
  repo_map:       .agent/REPO_MAP.md
  quality_gates:  .agent/QUALITY_GATES.md
  ui_verify:      .agent/UI_VERIFICATION.md
  stopping:       .agent/STOPPING_CRITERIA.md
  references:     .agent/REFERENCES.md
  decisions:      .agent/DECISIONS.md
  risks:          .agent/RISKS.md
  backlog:        .agent/BACKLOG.md
  handoff:        .agent/HANDOFF.md
  changelog:      .agent/CHANGELOG_AGENT.md
  playbook:       .agent/TASK_PLAYBOOK.md
  tools:          .agent/TOOLS_AND_SKILLS.md
  session_boot:   .agent/SESSION_BOOTSTRAP.md
  skills_index:   .agent/skills/README.md
  agents_index:   .agent/agents/README.md
  user_readme:    README.md

handoff: .agent/HANDOFF.md
