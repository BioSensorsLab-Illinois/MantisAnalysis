name: release

# Builds standalone, dependency-free MantisAnalysis executables for
# Windows, Linux (x86_64), and macOS (Intel + Apple Silicon) on every
# push to main and on tag pushes. Tag pushes (e.g. v0.2.0) additionally
# publish a GitHub Release with the archives attached.
#
# Linux is built on ubuntu-22.04 (GLIBC 2.35) so the resulting binary
# runs on Ubuntu 22.04+, Debian 12+, RHEL 9+, and any distro shipping
# GLIBC >= 2.35. Building on ubuntu-latest (24.04 = GLIBC 2.39) would
# cut compatibility with anything older.
#
# See packaging/README.md for local build instructions.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "packaging/**"
      - ".github/workflows/release.yml"
      - "pyproject.toml"
      - "vite.config.js"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub Release with the artifacts (requires a tag-like version)"
        required: false
        default: "false"

# Cancel in-flight runs on the same ref when a fresh push lands. Tag
# builds never get cancelled (each tag is its own ref).
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: write   # needed for softprops/action-gh-release on tag pushes

jobs:
  build:
    name: build / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            runner: windows-latest
            artifact_glob: "dist/MantisAnalysis-windows-*.zip"
          - label: linux-x86_64
            runner: ubuntu-22.04
            artifact_glob: "dist/MantisAnalysis-linux-*.zip"
          - label: macos-arm64
            runner: macos-14      # Apple Silicon
            artifact_glob: "dist/MantisAnalysis-macos-*.tar.gz"
          - label: macos-x86_64
            runner: macos-13      # Intel
            artifact_glob: "dist/MantisAnalysis-macos-*.tar.gz"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node 20
        # bundler-migration-v1 Phase 3 — the SPA is now Vite-bundled. The
        # frozen binary ships web/dist/, so `npm install && npm run build`
        # MUST run before PyInstaller (build.py invokes it for us).
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Linux runtime libs (matplotlib + h5py + ffmpeg + Pillow)
        # The PyInstaller binary on Linux dynamically loads libGL / libEGL
        # for matplotlib's Agg fall-back checks, libfontconfig for
        # matplotlib font resolution, and libxkbcommon for headless render
        # paths. ffmpeg is needed by smoke_frozen for the video-export
        # health check (imageio bundles a static ffmpeg, but having the
        # system one available avoids a one-time download in CI).
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon0 \
            libfontconfig1 \
            libfreetype6 \
            libjpeg-turbo8 \
            libpng16-16 \
            ffmpeg
          ffmpeg -version | head -1

      - name: Install project + build extras
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -e .[build]

      - name: Build standalone executable
        # build.py runs `npm install && npm run build` first, then PyInstaller.
        shell: bash
        run: python packaging/build.py --no-venv

      - name: Smoke-test the frozen binary (boot + /api/health)
        shell: bash
        run: python packaging/smoke_frozen.py

      - name: List built artifacts
        shell: bash
        run: ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MantisAnalysis-${{ matrix.label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -print -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
