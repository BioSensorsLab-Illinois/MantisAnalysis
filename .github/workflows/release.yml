name: release

# Builds standalone, dependency-free MantisAnalysis executables for
# Windows and macOS (both Intel and Apple Silicon) on every push to main
# and on tag pushes. Tag pushes (e.g. v0.2.0) additionally publish a
# GitHub Release with the archives attached.
#
# See packaging/README.md for local build instructions.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create a GitHub Release with the artifacts (requires a tag-like version)"
        required: false
        default: "false"

permissions:
  contents: write   # needed for softprops/action-gh-release on tag pushes

jobs:
  build:
    name: build / ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x86_64
            runner: windows-latest
            artifact_glob: "dist/MantisAnalysis-windows-*.zip"
          - label: macos-arm64
            runner: macos-14      # Apple Silicon
            artifact_glob: "dist/MantisAnalysis-macos-*.tar.gz"
          - label: macos-x86_64
            runner: macos-13      # Intel
            artifact_glob: "dist/MantisAnalysis-macos-*.tar.gz"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node 20
        # bundler-migration-v1 Phase 3 — the SPA is now Vite-bundled. The
        # frozen binary ships web/dist/, so `npm install && npm run build`
        # MUST run before PyInstaller (build.py invokes it for us).
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install project + build extras
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -e .[build]

      - name: Build standalone executable
        # build.py runs `npm install && npm run build` first, then PyInstaller.
        shell: bash
        run: python packaging/build.py --no-venv

      - name: Smoke-test the frozen binary (boot + /api/health)
        shell: bash
        run: python packaging/smoke_frozen.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MantisAnalysis-${{ matrix.label }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -print -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
