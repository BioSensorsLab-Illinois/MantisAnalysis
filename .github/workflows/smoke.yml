name: smoke

on:
  push:
    branches: [main, "**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-and-tier1:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Smoke tier 1 (imports)
        run: python scripts/smoke_test.py --tier 1

      - name: Pytest (unit, no GUI)
        run: python -m pytest tests/unit -q

  tier2-headless:
    name: tier2 headless figures (Linux only)
    runs-on: ubuntu-latest
    needs: unit-and-tier1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Smoke tier 2 (Agg figure builders)
        run: python scripts/smoke_test.py --tier 2

      - name: Pytest (headless)
        run: python -m pytest tests/headless -q

      - name: Upload sample figures (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-figures-${{ github.run_id }}
          path: outputs/smoke/
          if-no-files-found: ignore
          retention-days: 7
