name: smoke

on:
  push:
    branches: [main, "**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-and-tier1:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Smoke tier 1 (imports)
        run: python scripts/smoke_test.py --tier 1

      - name: Pytest (unit, no GUI)
        run: python -m pytest tests/unit -q

  tier2-headless:
    name: tier2 headless figures (Linux only)
    runs-on: ubuntu-latest
    needs: unit-and-tier1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Smoke tier 2 (Agg figure builders)
        run: python scripts/smoke_test.py --tier 2

      - name: Pytest (headless)
        run: python -m pytest tests/headless -q

      - name: Upload sample figures (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-figures-${{ github.run_id }}
          path: outputs/smoke/
          if-no-files-found: ignore
          retention-days: 7

  tier3-server:
    name: tier3 FastAPI round-trip (Linux only)
    runs-on: ubuntu-latest
    needs: unit-and-tier1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Smoke tier 3 (FastAPI endpoints)
        run: python scripts/smoke_test.py --tier 3

  tier4-web-smoke:
    # bundler-migration-v1 Phase 3 — Playwright now actually exercises the
    # Vite-built SPA, not the CDN path. Without `npm run build` the boot
    # test would skip and CI would have zero browser coverage of the new
    # bundle. Linux-only because Playwright Chromium is heaviest there +
    # the other matrix tiers already cover Python portability.
    #
    # recording-inspection-implementation-v1 M12 — also installs `ffmpeg`
    # so the M10 video-export tests (`test_export_video_*`) actually
    # run instead of skipping (per ExecPlan §M10 — `imageio-ffmpeg` is a
    # hard prerequisite for M10 close).
    name: tier4 web smoke (Vite build + Playwright + ffmpeg)
    runs-on: ubuntu-latest
    needs: unit-and-tier1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install runtime + web-smoke deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,web-smoke]

      - name: Install ffmpeg (for video export tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Build the SPA (npm install + npm run build)
        run: |
          npm install
          npm run build

      - name: Pytest -m web_smoke
        run: python -m pytest -m web_smoke -q

      # recording-inspection-implementation-v1 M12 — Tier 6 visual
      # baselines: tests/web/test_playback_visual_baselines.py writes
      # canonical PNGs to .agent/runs/recording-inspection-implementation-v1/
      # screenshots/. Upload them as a CI artifact so reviewers can
      # eyeball the rendered states without re-booting locally. This
      # is *not* a diff-against-baseline gate — that's a follow-up
      # initiative (visual-regression-infra-v1 in BACKLOG).
      - name: Upload Playback visual baselines (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playback-visual-baselines-${{ github.run_id }}
          path: .agent/runs/recording-inspection-implementation-v1/screenshots/*.png
          if-no-files-found: warn
          retention-days: 14
